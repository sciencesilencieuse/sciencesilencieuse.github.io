var gd = document.getElementById('f71bc316-e150-4abc-9b0b-8b43d832bde5');
var MB = null;   // emprise a garder visible (cartes) ou null
var DEF = 0.75;  // ratio zone-de-trace / largeur pour les graphes libres
var MINP = 320;   // hauteur minimale de la zone de trace (px)
var MAXP = 700;   // hauteur maximale de la zone de trace (px)
var lastW = -1;

function px(lon){ return (lon+180)/360; }
function py(lat){ var r=lat*Math.PI/180; return (1-Math.log(Math.tan(r)+1/Math.cos(r))/Math.PI)/2; }
function unlat(y){ var t=Math.PI*(1-2*y); return 180/Math.PI*Math.atan((Math.exp(t)-Math.exp(-t))/2); }
function mapKeys(fl){ return Object.keys(fl).filter(function(k){ return /^map(box)?\d*$/.test(k) && fl[k] && fl[k].domain; }); }
function extentRatio(){ return Math.abs(py(MB.s)-py(MB.n))/Math.abs(px(MB.e)-px(MB.w)); }

function idealHeight(){
  var fl = gd._fullLayout, sz = fl._size;
  var keys = mapKeys(fl);
  if (keys.length && MB){
    var d = fl[keys[0]].domain;
    var Wm = sz.w*(d.x[1]-d.x[0]);                  // largeur de la carte seule (hors colorbar)
    return Math.round(Wm*extentRatio()/(d.y[1]-d.y[0]) + sz.t + sz.b);
  }
  var ya = fl.yaxis, xa = fl.xaxis;
  if (ya && xa && ya.range && xa.range && (ya.scaleanchor || xa.scaleanchor)){
    var rx = Math.abs(xa.range[1]-xa.range[0]), ry = Math.abs(ya.range[1]-ya.range[0]);
    var sr = ya.scaleanchor ? (ya.scaleratio||1) : 1/((xa.scaleratio)||1);
    return Math.round(sz.w*(ry/rx)*sr + sz.t + sz.b); // zone de trace au bon ratio + marges reelles
  }
  // Graphe libre (barres, courbes) : le ratio s'applique a la zone de trace,
  // bornee entre MINP et MAXP ; les marges (labels...) s'ajoutent par-dessus.
  var plotH = Math.min(MAXP, Math.max(MINP, sz.w*DEF));
  return Math.round(plotH + sz.t + sz.b);
}

function fitMaps(){
  if (!MB) return Promise.resolve();
  var fl = gd._fullLayout, keys = mapKeys(fl);
  if (!keys.length) return Promise.resolve();
  var dx = Math.abs(px(MB.e)-px(MB.w)), dy = Math.abs(py(MB.s)-py(MB.n));
  var lat = unlat((py(MB.n)+py(MB.s))/2), lon = (MB.w+MB.e)/2;
  var upd = {};
  keys.forEach(function(k){
    var d = fl[k].domain, sz = fl._size;
    var W = sz.w*(d.x[1]-d.x[0]), H = sz.h*(d.y[1]-d.y[0]);
    upd[k+'.zoom'] = Math.min(Math.log2(W/(512*dx)), Math.log2(H/(512*dy)));
    upd[k+'.center'] = {lat: lat, lon: lon};
  });
  return Plotly.relayout(gd, upd);
}

function report(){
  try { parent.postMessage({type:'plotly-autoresize', height: gd.offsetHeight}, '*'); } catch(e) {}
}

function sync(){
  gd.style.height = idealHeight() + 'px';
  Plotly.Plots.resize(gd).then(function(){
    gd.style.height = idealHeight() + 'px';   // 2e passe : les marges auto ont pu bouger
    return Plotly.Plots.resize(gd);
  }).then(fitMaps).then(report);
}

var t;
window.addEventListener('resize', function(){
  if (Math.abs(gd.clientWidth - lastW) < 2) return;   // la parente vient d'ajuster la hauteur : ignorer
  clearTimeout(t);
  t = setTimeout(function(){ lastW = gd.clientWidth; sync(); }, 120);
});
lastW = gd.clientWidth;
sync();
[600, 1500].forEach(function(ms){ setTimeout(report, ms); });  // re-emissions de securite
